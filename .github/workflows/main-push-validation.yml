name: Validate All SHACL Shapes

on:
  push:
    branches:
      - main
  workflow_dispatch:  # allows manual triggering


env: 
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Ensures compatibility with Node.js 24 for JavaScript-based actions 
  
jobs:
  main-push-validation:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyshacl rdflib rich

      - name: Validate all TTL files
        run: |
          bash scripts/validate-shacl-shapes-dir.sh

      - name: Metadata & immutability checks
        run: |
          python scripts/check-metadata-and-immutability.py

      - name: Namespace & naming checks
        run: |
          python scripts/check-namespaces-and-names.py