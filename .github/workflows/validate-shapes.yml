name: Validate SHACL Shapes

on:
  pull_request:
    paths:
      - 'shapes/**/*.ttl'

jobs:
  shacl-validation:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyshacl rdflib

      - name: SHACL Syntax Validation
        run: |
          echo "Running SHACL syntax validation..."
          for file in $(find shapes -name '*.ttl' | sort); do
            echo "Validating $file..."
            pyshacl -s "$file" -v || exit 1
          done

      - name: Metadata & Immutability Checks
        run: |
          echo "Running metadata and immutability validation..."
          python scripts/check-metadata-and-immutability.py

      - name: Namespace & Naming Checks
        run: |
          echo "Running namespace and naming validation..."
          python scripts/check-namespaces-and-names.py