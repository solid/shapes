name: Validate SHACL Shapes on PR

on:
  pull_request:
    branches:
      - main
    paths:
      - 'shapes/**/*.ttl'

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test
