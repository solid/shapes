name: Validate SHACL Shapes on PR

on:
  pull_request:
    branches:
      - main
    paths:
      - 'shapes/**/*.ttl'

env: 
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Ensures compatibility with Node.js 24 for JavaScript-based actions 

jobs:
  main-pr-validation:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyshacl rdflib rich

      - name: Validate only changed TTL files
        run: |
          git fetch origin main
          changed_files=$(git diff --name-only origin/main...HEAD -- '*.ttl')

          if [ -z "$changed_files" ]; then
            echo "No TTL files added or modified in this PR."
          else
            echo "Validating changed TTL files:"
            echo "$changed_files"
            ok=true
            for file in $changed_files; do
              echo "───────────────────────────────"
              echo "Validating $file..."
              python shapes/scripts/validate-shacl-shapes-file.py "$file" || ok=false
            done
            $ok || exit 1
          fi

      - name: Metadata & immutability checks
        run: |
          python scripts/check-metadata-and-immutability.py

      - name: Namespace & naming checks
        run: |
          python scripts/check-namespaces-and-names.py